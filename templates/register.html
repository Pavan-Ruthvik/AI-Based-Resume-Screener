{% extends 'base.html' %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="custom-card p-5 w-100" style="max-width: 500px;">
        
        <div class="text-center mb-4">
            <i class="fas fa-user-plus fa-3x text-primary mb-3"></i>
            <h2 class="fw-bold">Create Account</h2>
            <p class="text-muted">Join the AI Resume Screener</p>
        </div>

        <form method="POST" action="{{ url_for('auth.register') }}">
            <div class="mb-3">
                <label for="username" class="form-label fw-bold">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="fas fa-user text-muted"></i></span>
                    <input type="text" class="form-control" id="username" name="username" placeholder="JohnDoe" required>
                </div>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label fw-bold">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="fas fa-envelope text-muted"></i></span>
                    <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" required>
                </div>
            </div>
            
            <div class="mb-3">
                <label for="password" class="form-label fw-bold">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="fas fa-lock text-muted"></i></span>
                    <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
                </div>
            </div>

            <div class="mb-4">
                <label for="role" class="form-label fw-bold">I am a:</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="fas fa-id-badge text-muted"></i></span>
                    <select class="form-select" id="role" name="role" required>
                        <option value="jobseeker" selected>Job Seeker</option>
                        <option value="recruiter">Recruiter / HR</option>
                    </select>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold fs-5">Register</button>
        </form>
        
        <div class="text-center mt-4">
            <p class="text-muted">Already have an account? <a href="{{ url_for('auth.login') }}" class="text-decoration-none fw-bold">Log in here</a>.</p>
        </div>
    </div>
</div>
{% endblock %}
